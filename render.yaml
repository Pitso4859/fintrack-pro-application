# render.yaml — Infrastructure as Code for Render.com
# Deploy the entire stack with one click

services:

  # ----------------------------------------------------------------
  # Backend — Spring Boot API
  # ----------------------------------------------------------------
  - type: web
    name: fintrack-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: fintrack-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: fintrack-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: fintrack-db
          property: password
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: JWT_REFRESH_EXPIRATION_MS
        value: "604800000"
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set to your frontend URL after deploy
    healthCheckPath: /actuator/health

  # ----------------------------------------------------------------
  # Frontend — React Static Site
  # ----------------------------------------------------------------
  - type: web
    name: fintrack-app
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://fintrack-api.onrender.com/api

# ----------------------------------------------------------------
# Database — PostgreSQL
# ----------------------------------------------------------------
databases:
  - name: fintrack-db
    plan: free
    databaseName: fintrack
    user: fintrack
