# ============================================================
# FinTrack Pro — Application Configuration
# Profile: default (overridden by application-prod.properties)
# ============================================================

spring.application.name=fintrack-pro

# ============================================================
# SERVER
# ============================================================
server.port=${PORT:8080}
server.address=0.0.0.0
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024
server.error.include-message=never
server.error.include-stacktrace=never

# ============================================================
# DATABASE — override via environment variables in production
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:fintrack;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.open-in-view=false

# ============================================================
# LIQUIBASE (database migrations)
# ============================================================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# ============================================================
# SECURITY / JWT
# ============================================================
app.jwt.secret=${JWT_SECRET:your-super-secret-key-at-least-256-bits-long-change-in-prod}
app.jwt.access-token-expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================================
# GEMINI AI
# ============================================================
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-1.5-flash
app.gemini.base-url=https://generativelanguage.googleapis.com/v1beta/models

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ============================================================
# LOGGING
# ============================================================
logging.level.com.fintrack=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
